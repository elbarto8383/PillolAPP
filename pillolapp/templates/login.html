<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>PillolAPP — Accesso</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=5">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center;
           background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); }
    .login-box { background: white; border-radius: 20px; padding: 2rem;
                 width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo .icon { font-size: 3rem; }
    .login-logo h1 { font-size: 1.4rem; font-weight: 700; color: #1e293b; margin-top: 0.5rem; }
    .login-logo p { color: #64748b; font-size: 0.85rem; }
    .login-error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626;
                   border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem;
                   font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">💊</div>
      <h1>PillolAPP</h1>
      <p>Accedi con le tue credenziali</p>
    </div>

    {% if errore %}
    <div class="login-error">{{ errore }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username"
               placeholder="Il tuo username" autocomplete="username"
               value="{{ username_prev or '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" class="form-control" name="password" id="login-password"
                 placeholder="La tua password" autocomplete="current-password"
                 style="padding-right:2.5rem;" required>
          <button type="button" onclick="togglePwd('login-password',this)"
                  style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);
                         background:none;border:none;cursor:pointer;font-size:1rem;
                         color:#94a3b8;padding:0;">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:1rem;">
        Accedi
      </button>
    </form>
  </div>
<script>
function togglePwd(id, btn) {
  const el = document.getElementById(id);
  if (el.type === 'password') { el.type = 'text'; btn.textContent = '🙈'; }
  else { el.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
