<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>I miei farmaci</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css?v=5">
</head>
<body>

<header class="header">
  <span class="header-icon">💊</span>
  <div>
    <h1>{{ paziente.nome }} {{ paziente.cognome }}</h1>
    <div class="subtitle">I miei farmaci</div>
  </div>
  <a href="javascript:history.back()"
     style="margin-left:auto;color:rgba(255,255,255,0.7);font-size:0.8rem;
            text-decoration:none;background:rgba(255,255,255,0.15);
            padding:0.3rem 0.7rem;border-radius:20px;">← Home</a>
  <a href="/logout"
     style="margin-left:0.4rem;color:rgba(255,255,255,0.7);font-size:0.8rem;
            text-decoration:none;background:rgba(255,255,255,0.15);
            padding:0.3rem 0.7rem;border-radius:20px;">🚪 Esci</a>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('oggi')">📋 Oggi</button>
  <button class="tab-btn" onclick="showTab('terapie')">💊 Terapie</button>
  <button class="tab-btn" onclick="showTab('scorte')">📦 Scorte</button>
  <button class="tab-btn" onclick="showTab('astuccio')">🗓️ Astuccio</button>
</nav>

<div class="container">

  <!-- ══ TAB OGGI ══ -->
  <div id="tab-oggi">
    <div class="card mt-md" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:none">
      <div class="flex-between">
        <div>
          <div style="font-size:1.1rem;font-weight:700" id="saluto-nome">Ciao!</div>
          <div class="text-muted text-sm" id="saluto-data"></div>
        </div>
        <span style="font-size:2.5rem">👋</span>
      </div>
    </div>

    <div class="flex-between mt-md mb-sm">
      <span class="card-title">Farmaci di oggi</span>
      <span class="badge badge-info" id="badge-oggi"></span>
    </div>
    <div id="lista-oggi">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ══ TAB TERAPIE ══ -->
  <div id="tab-terapie" class="hidden">
    <div class="flex-between mt-md mb-md">
      <span class="card-title">Le mie terapie</span>
      <button class="btn btn-primary btn-sm" onclick="apriFomTerapia()">+ Aggiungi</button>
    </div>
    <div id="lista-terapie-paz">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ══ TAB SCORTE ══ -->
  <div id="tab-scorte" class="hidden">
    <div class="flex-between mt-md mb-md">
      <span class="card-title">Le mie scorte</span>
    </div>
    <div id="lista-scorte-paz">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ══ TAB ASTUCCIO ══ -->
  <div id="tab-astuccio" class="hidden">
    <div class="flex-between mt-md mb-md">
      <span class="card-title">Astuccio questa settimana</span>
      <button class="btn btn-primary btn-sm" onclick="generaAstuccio()">🔄 Rigenera</button>
    </div>
    <div id="astuccio-paz">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</div><!-- /container -->

<!-- ══ MODAL NUOVA TERAPIA ══ -->
<div class="modal-overlay" id="modal-terapia">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Aggiungi terapia</div>

    <div class="form-group">
      <label class="form-label">Cerca farmaco (AIC)</label>

      <div id="ocr-area" style="background:#1e293b;border-radius:12px;overflow:hidden;position:relative;">

        <!-- Video live -->
        <div id="scanner-video-area" style="position:relative;">
          <video id="ocr-video" autoplay playsinline muted
                 style="width:100%;display:block;max-height:200px;object-fit:cover;"></video>
          <!-- Mirino -->
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                      width:70%;height:50%;border:2px solid rgba(255,255,255,0.7);
                      border-radius:8px;pointer-events:none;"></div>
          <!-- Bottone scatta -->
          <button onclick="scattaFoto()" style="position:absolute;bottom:10px;left:50%;
                  transform:translateX(-50%);background:white;border:none;border-radius:50%;
                  width:52px;height:52px;font-size:1.4rem;cursor:pointer;
                  box-shadow:0 2px 8px rgba(0,0,0,0.4);">📸</button>
        </div>

        <!-- Stato analisi -->
        <div id="scanner-analisi" class="hidden" style="padding:1rem;text-align:center;">
          <div style="color:white;">🔍 Analisi in corso...</div>
        </div>

        <!-- Risultato -->
        <div id="scanner-result" class="hidden" style="padding:0.75rem;text-align:center;">
          <div id="scanner-result-text" style="color:white;font-size:0.85rem;"></div>
          <button onclick="riattivaCamera()"
                  style="margin-top:0.4rem;background:rgba(255,255,255,0.15);border:none;
                         color:#94a3b8;border-radius:6px;padding:0.3rem 0.7rem;
                         font-size:0.75rem;cursor:pointer;">🔄 Riprova</button>
        </div>

        <canvas id="ocr-canvas" class="hidden"></canvas>
        <span id="ocr-icon" class="hidden"></span>
        <span id="ocr-text" class="hidden"></span>
        <span id="ocr-viewfinder" class="hidden"></span>
        <!-- Fallback: input file per chi preferisce caricare foto -->
        <div style="text-align:center;padding:0.4rem;border-top:1px solid rgba(255,255,255,0.1);">
          <label style="color:#64748b;font-size:0.72rem;cursor:pointer;">
            oppure carica foto
            <input type="file" id="foto-input" accept="image/*"
                   style="display:none" onchange="elaboraFoto(this)">
          </label>
        </div>
      </div>

      <div class="flex gap-sm mt-sm">
        <input type="text" class="form-control" id="ter-aic" placeholder="AIC (es. 035246)">
        <button class="btn btn-ghost btn-sm" onclick="lookupAIC()">Cerca</button>
      </div>
    </div>

    <div id="farmaco-trovato" class="card hidden" style="background:var(--success-bg);border:1px solid #86efac;margin-bottom:1rem">
      <div class="flex-between">
        <div>
          <div class="fw-bold" id="farmaco-nome-display"></div>
          <div class="text-sm text-muted" id="farmaco-pa-display"></div>
        </div>
        <span class="badge badge-success">✓</span>
      </div>
      <input type="hidden" id="ter-farmaco-id">
    </div>

    <div id="farmaco-manuale-area" class="hidden">
      <div class="form-group">
        <label class="form-label">Nome farmaco *</label>
        <input type="text" class="form-control" id="ter-farmaco-nome" placeholder="es. Ramipril 5mg">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Dose *</label>
      <input type="text" class="form-control" id="ter-dose" placeholder="es. 1 compressa">
    </div>

    <div class="form-group">
      <label class="form-label">Orari assunzione *</label>
      <div class="flex gap-sm">
        <input type="time" class="form-control" id="ter-orario-input" style="flex:1">
        <button class="btn btn-ghost btn-sm" onclick="aggiungiOrario()">+</button>
      </div>
      <div class="orari-list mt-sm" id="orari-list"></div>
      <input type="hidden" id="ter-orari-json" value="[]">
    </div>

    <div class="form-group">
      <label class="form-label">Durata (giorni, vuoto = continua)</label>
      <input type="number" class="form-control" id="ter-durata" placeholder="es. 30">
    </div>

    <div class="form-group">
      <label class="form-label">Giorni della settimana</label>
      <div class="flex flex-wrap gap-sm" id="giorni-selector">
        <button class="giorno-btn active" data-g="0">Lun</button>
        <button class="giorno-btn active" data-g="1">Mar</button>
        <button class="giorno-btn active" data-g="2">Mer</button>
        <button class="giorno-btn active" data-g="3">Gio</button>
        <button class="giorno-btn active" data-g="4">Ven</button>
        <button class="giorno-btn active" data-g="5">Sab</button>
        <button class="giorno-btn active" data-g="6">Dom</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Note</label>
      <textarea class="form-control" id="ter-note" rows="2" placeholder="Prendere a stomaco pieno..."></textarea>
    </div>

    <div class="flex gap-sm mt-md">
      <button class="btn btn-ghost btn-block" onclick="chiudiModal('modal-terapia')">Annulla</button>
      <button class="btn btn-primary btn-block" onclick="salvaTerapia()">Salva</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  const PAZIENTE_ID = {{ paziente.id }};
  const PAZIENTE    = {{ paziente | tojson }};
  const GIORNI_IT   = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
  const MESI_IT     = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                       'luglio','agosto','settembre','ottobre','novembre','dicembre'];
  const FASCE       = {M:'☀️ Mattina', P:'🌤 Pranzo', S:'🌙 Sera', N:'🌑 Notte'};

  let orari_sel = [];
  let giorni_sel = [0,1,2,3,4,5,6];

  // ── Gestione click giorni ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const gs = document.getElementById('giorni-selector');
    if (gs) {
      gs.addEventListener('click', e => {
        const btn = e.target.closest('.giorno-btn');
        if (!btn) return;
        const g = parseInt(btn.dataset.g);
        btn.classList.toggle('active');
        if (btn.classList.contains('active')) {
          if (!giorni_sel.includes(g)) giorni_sel.push(g);
        } else {
          giorni_sel = giorni_sel.filter(x => x !== g);
        }
      });
    }
  });

  // ── Utils ──────────────────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    event.target.classList.add('active');
    if (name === 'terapie') caricaTerapiePaz();
    if (name === 'scorte')  caricaScortePaz();
    if (name === 'astuccio') caricaAstuccioPaz();
  }

  async function api(path, method='GET', body=null) {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    return r.json();
  }

  function toast(msg, type='') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  function apriModal(id) { document.getElementById(id).classList.add('open'); }
  function chiudiModal(id) {
    document.getElementById(id).classList.remove('open');
    fermaCamera();
  }

  // ── Oggi ───────────────────────────────────────────────────────────────
  async function caricaOggi() {
    const d = new Date();
    document.getElementById('saluto-nome').textContent =
      `Ciao, ${PAZIENTE.nome}!`;
    document.getElementById('saluto-data').textContent =
      `${GIORNI_IT[d.getDay() === 0 ? 6 : d.getDay()-1]} ${d.getDate()} ${MESI_IT[d.getMonth()]}`;

    const [terapie, log] = await Promise.all([
      api('/api/terapie/' + PAZIENTE_ID),
      api('/api/assunzioni/' + PAZIENTE_ID + '?giorni=1')
    ]);

    const ora = d.getHours() * 60 + d.getMinutes();
    const el = document.getElementById('lista-oggi');
    let cards = [];

    for (const t of terapie) {
      const orari = JSON.parse(t.orari || '[]');
      for (const o of orari) {
        const [oh, om] = o.split(':').map(Number);
        const minOra = oh * 60 + om;
        const giaPresa = log.find(a => a.terapia_id == t.id &&
          a.orario_previsto.includes(o) && a.esito === 'SI');
        const pend = log.find(a => a.terapia_id == t.id &&
          a.orario_previsto.includes(o) && a.esito === 'PENDENTE');

        cards.push({
          terapia: t, orario: o, minOra,
          presa: !!giaPresa,
          assunzione_id: pend?.id || null,
          futuro: minOra > ora
        });
      }
    }

    cards.sort((a,b) => a.minOra - b.minOra);
    document.getElementById('badge-oggi').textContent =
      cards.filter(c => !c.presa).length + ' da prendere';

    if (!cards.length) {
      el.innerHTML = '<div class="empty-state"><span class="icon">🌟</span><p>Nessun farmaco configurato</p></div>';
      return;
    }

    el.innerHTML = cards.map(c => {
      const stato = c.presa ? 'preso' : c.futuro ? 'futuro' : 'ora';
      const borderColor = {preso:'#16a34a', futuro:'#94a3b8', ora:'#2563eb'}[stato];
      return `<div class="card mb-sm" style="border-left:5px solid ${borderColor}">
        <div style="display:flex;align-items:center;gap:0.85rem;margin-bottom:0.6rem;">
          <div class="farmaco-avatar"
            data-farmaco-id="${c.terapia.farmaco_id || ''}"
            data-nome="${c.terapia.farmaco_nome}"
            data-immagine-locale="${c.terapia.immagine_locale || ''}"
            data-immagine-url="${c.terapia.immagine_url || ''}"
            data-colore-avatar="${c.terapia.colore_avatar || ''}"
            data-size="52">
          </div>
          <div style="flex:1;min-width:0;">
            <div class="flex-between">
              <span style="font-size:0.9rem;font-weight:700;color:#64748b">⏰ ${c.orario}</span>
              ${c.presa ? '<span class="badge badge-success">✅ Preso</span>' :
                c.futuro ? '<span class="badge badge-gray">In arrivo</span>' :
                '<span class="badge badge-info">Da confermare</span>'}
            </div>
            <div style="font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.terapia.farmaco_nome}</div>
            <div style="color:#64748b;font-size:0.9rem">${c.terapia.dose}</div>
          </div>
        </div>
        ${!c.presa && !c.futuro && c.assunzione_id ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
          <button class="btn btn-success" onclick="conferma(${c.assunzione_id},'SI',this)">✅ Ho preso</button>
          <button class="btn btn-ghost"   onclick="conferma(${c.assunzione_id},'NO',this)">⏰ Non ancora</button>
        </div>` : ''}
      </div>`;
    }).join('');
    FarmacoAvatar.render();
  }

  async function conferma(id, esito, btn) {
    btn.disabled = true;
    await api('/api/assunzioni/conferma', 'POST', { assunzione_id: id, esito, canale: 'pwa' });
    toast(esito === 'SI' ? '✅ Assunzione registrata!' : '⏰ Ricordati di prenderlo!',
          esito === 'SI' ? 'success' : '');
    await caricaOggi();
  }

  // ── Terapie (paziente) ─────────────────────────────────────────────────
  async function caricaTerapiePaz() {
    const terapie = await api('/api/terapie/' + PAZIENTE_ID);
    const el = document.getElementById('lista-terapie-paz');
    if (!terapie.length) {
      el.innerHTML = '<div class="empty-state"><span class="icon">💊</span><p>Nessuna terapia attiva</p></div>';
      return;
    }
    el.innerHTML = '<ul class="item-list">' + terapie.map(t => {
      const orari = JSON.parse(t.orari || '[]');
      return `<li class="item-row">
        <div class="farmaco-avatar"
          data-farmaco-id="${t.farmaco_id}"
          data-nome="${t.farmaco_nome}"
          data-immagine-locale="${t.immagine_locale || ''}"
          data-immagine-url="${t.immagine_url || ''}"
          data-colore-avatar="${t.colore_avatar || ''}"
          data-upload="true"
          data-size="48">
        </div>
        <div class="item-body">
          <div class="item-title">${t.farmaco_nome}</div>
          <div class="item-meta">${t.dose}</div>
          <div class="orari-list mt-sm">
            ${orari.map(o => `<span class="orario-pill">⏰ ${o}</span>`).join('')}
          </div>
          ${t.note ? `<div class="text-sm text-muted mt-sm">ℹ️ ${t.note}</div>` : ''}
        </div>
        <button class="btn btn-ghost btn-icon" onclick="eliminaTerapia(${t.id})">🗑️</button>
      </li>`;
    }).join('') + '</ul>';
    FarmacoAvatar.render();
  }

  function apriFomTerapia() {
    orari_sel = [];
    giorni_sel = [0,1,2,3,4,5,6];
    ['ter-dose','ter-note','ter-durata','ter-aic'].forEach(id => document.getElementById(id).value='');
    document.getElementById('farmaco-trovato').classList.add('hidden');
    document.getElementById('farmaco-manuale-area').classList.add('hidden');
    document.getElementById('ter-farmaco-id').value = '';
    document.getElementById('scanner-result').classList.add('hidden');
    document.getElementById('scanner-analisi').classList.add('hidden');
    document.getElementById('scanner-video-area').style.display = '';
    document.querySelectorAll('.giorno-btn').forEach(b => b.classList.add('active'));
    renderOrari();
    apriModal('modal-terapia');
    // Avvia camera dopo apertura modal
    setTimeout(() => avviaCamera(), 300);
  }

  function aggiungiOrario() {
    const v = document.getElementById('ter-orario-input').value;
    if (!v || orari_sel.includes(v)) return;
    orari_sel.push(v); orari_sel.sort(); renderOrari();
    document.getElementById('ter-orario-input').value = '';
  }

  function renderOrari() {
    document.getElementById('orari-list').innerHTML = orari_sel.map(o =>
      `<span class="orario-pill">⏰ ${o} <button class="remove" onclick="rimuoviOrario('${o}')">×</button></span>`
    ).join('');
    document.getElementById('ter-orari-json').value = JSON.stringify(orari_sel);
  }

  function rimuoviOrario(o) { orari_sel = orari_sel.filter(x => x !== o); renderOrari(); }

  async function lookupAIC() {
    const aic = document.getElementById('ter-aic').value.trim();
    if (!aic) { toast('Inserisci un AIC', 'error'); return; }
    toast('Ricerca su AIFA...');
    const r = await api('/api/farmaci/lookup', 'POST', { aic });
    if (r.error) {
      document.getElementById('farmaco-manuale-area').classList.remove('hidden');
      toast('Non trovato — inserisci manualmente', 'error'); return;
    }
    const f = r.farmaco;
    document.getElementById('ter-farmaco-id').value = f.id;
    document.getElementById('farmaco-nome-display').textContent = f.nome;
    document.getElementById('farmaco-pa-display').textContent = f.principio_attivo || '';
    document.getElementById('farmaco-trovato').classList.remove('hidden');
    document.getElementById('farmaco-manuale-area').classList.add('hidden');
    toast('Trovato ✓', 'success');
  }

  async function salvaTerapia() {
    const dose = document.getElementById('ter-dose').value.trim();
    let fid = document.getElementById('ter-farmaco-id').value;

    // Leggi orari con fallback dal campo hidden
    let orari = orari_sel.length ? orari_sel :
      JSON.parse(document.getElementById('ter-orari-json').value || '[]');

    if (!dose) { toast('Inserisci la dose', 'error'); return; }
    if (!orari.length) { toast('Aggiungi almeno un orario', 'error'); return; }

    if (!fid) {
      const nome = document.getElementById('ter-farmaco-nome') ?
        document.getElementById('ter-farmaco-nome').value.trim() : '';
      const aic = document.getElementById('ter-aic').value.trim();
      if (!nome && !aic) { toast('Nome farmaco obbligatorio', 'error'); return; }
      if (nome) {
        const r = await api('/api/farmaci', 'POST', { nome, aic: aic || null });
        fid = r.id;
      }
    }

    const payload = {
      paziente_id: PAZIENTE_ID,
      dose,
      orari,
      giorni_settimana: giorni_sel.length ? giorni_sel : [0,1,2,3,4,5,6],
      durata_giorni: document.getElementById('ter-durata').value || null,
      note: document.getElementById('ter-note').value || null,
      data_inizio: new Date().toISOString().slice(0,10),
      aic: document.getElementById('ter-aic').value.trim() || null,
    };
    if (fid) payload.farmaco_id = parseInt(fid);

    const r = await api('/api/terapie', 'POST', payload);
    if (!r || r.error) { toast(r?.error || 'Errore salvataggio', 'error'); return; }
    chiudiModal('modal-terapia');
    toast('Terapia salvata ✓', 'success');
    caricaTerapiePaz();
  }

  async function eliminaTerapia(id) {
    if (!confirm('Eliminare questa terapia?')) return;
    await api('/api/terapie/' + id, 'DELETE');
    toast('Terapia eliminata'); caricaTerapiePaz();
  }

  // ── Scorte ─────────────────────────────────────────────────────────────
  async function caricaScortePaz() {
    const scorte = await api('/api/scorte/' + PAZIENTE_ID);
    const el = document.getElementById('lista-scorte-paz');
    if (!scorte.length) {
      el.innerHTML = '<div class="empty-state"><span class="icon">📦</span><p>Nessuna scorta registrata</p></div>';
      return;
    }
    el.innerHTML = '<ul class="item-list">' + scorte.map(s => {
      const bassa = s.quantita <= s.soglia_minima;
      const pct = Math.min((s.quantita / Math.max(s.soglia_minima * 4, 1)) * 100, 100);
      return `<li class="item-row">
        <div class="item-icon ${bassa ? 'red' : 'green'}">${bassa ? '⚠️' : '💊'}</div>
        <div class="item-body">
          <div class="item-title">${s.farmaco_nome}</div>
          <div class="item-meta">${s.quantita} ${s.unita} · ${bassa ? '⚠️ Scorta bassa' : 'OK'}</div>
          <div style="background:var(--gray-100);border-radius:4px;height:5px;margin-top:6px">
            <div style="background:${bassa?'var(--danger)':'var(--success)'};width:${pct}%;height:100%;border-radius:4px"></div>
          </div>
        </div>
      </li>`;
    }).join('') + '</ul>';
  }

  // ── Astuccio ───────────────────────────────────────────────────────────
  async function caricaAstuccioPaz() {
    const slots = await api('/api/astuccio/' + PAZIENTE_ID);
    const el = document.getElementById('astuccio-paz');
    if (!slots.length) {
      el.innerHTML = '<div class="empty-state"><span class="icon">🗓️</span><p>Nessun piano. Clicca Rigenera.</p></div>';
      return;
    }

    const perGiorno = {};
    slots.forEach(s => {
      if (!perGiorno[s.giorno]) perGiorno[s.giorno] = {};
      perGiorno[s.giorno][s.fascia] = s;
    });

    el.innerHTML = GIORNI_IT.map((g, gi) => {
      const dg = perGiorno[gi] || {};
      const fasce = ['M','P','S','N'].map(f => {
        const slot = dg[f];
        if (!slot) return `<div class="astuccio-slot vuoto"><span>—</span><span style="font-size:0.65rem">${FASCE[f]}</span></div>`;
        const cls = slot.caricato ? 'caricato' : 'da-fare';
        const ids = JSON.parse(slot.farmaci_ids || '[]');
        return `<div class="astuccio-slot ${cls}" onclick="toggleSlot(${slot.id},${slot.caricato})">
          <span>${slot.caricato ? '✅' : '⭕'}</span>
          <span style="font-size:0.65rem">${FASCE[f]}</span>
          <span style="font-size:0.6rem">${ids.length} farm.</span>
        </div>`;
      }).join('');
      return `<div class="card mb-sm">
        <div class="card-title mb-sm">${g}</div>
        <div class="astuccio-grid">${fasce}</div>
      </div>`;
    }).join('');
  }

  async function toggleSlot(id, caricato) {
    await api('/api/astuccio/slot/' + id + '/carica', 'POST', { caricato: !caricato });
    caricaAstuccioPaz();
  }

  async function generaAstuccio() {
    await api('/api/astuccio/genera', 'POST', { paziente_id: PAZIENTE_ID });
    toast('Astuccio generato ✓', 'success');
    caricaAstuccioPaz();
  }

  // ── Scanner foto ───────────────────────────────────────────────────────
  // ── Camera live + cattura frame ─────────────────────────────────────────
  let _cameraStream = null;

  async function avviaCamera() {
    try {
      _cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      const video = document.getElementById('ocr-video');
      video.srcObject = _cameraStream;
      await video.play();
      document.getElementById('scanner-video-area').style.display = '';
    } catch(e) {
      console.warn('[Camera] Non disponibile:', e);
    }
  }

  function fermaCamera() {
    if (_cameraStream) {
      _cameraStream.getTracks().forEach(t => t.stop());
      _cameraStream = null;
    }
  }

  function riattivaCamera() {
    document.getElementById('scanner-result').classList.add('hidden');
    document.getElementById('scanner-analisi').classList.add('hidden');
    document.getElementById('scanner-video-area').style.display = '';
    avviaCamera();
  }

  async function scattaFoto() {
    const video = document.getElementById('ocr-video');
    const canvas = document.getElementById('ocr-canvas');

    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;

    if (vw === 0 || vh === 0) {
      toast('Camera non pronta — riprova tra un secondo', 'error');
      return;
    }

    const cw = Math.round(vw * 0.70);
    const ch = Math.round(vh * 0.55);
    const cx = Math.round((vw - cw) / 2);
    const cy = Math.round((vh - ch) / 2);

    canvas.width  = cw;
    canvas.height = ch;
    canvas.getContext('2d').drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    console.log('[OCR] DataURL length:', dataUrl.length);

    if (dataUrl.length < 1000) {
      toast('Frame vuoto — riprova', 'error');
      return;
    }

    fermaCamera();
    document.getElementById('scanner-video-area').style.display = 'none';
    document.getElementById('scanner-analisi').classList.remove('hidden');
    document.getElementById('scanner-result').classList.add('hidden');

    try {
      const resp = await fetch('/api/farmaci/ocr-foto-b64', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ immagine: dataUrl })
      });
      const r = await resp.json();
      console.log('[OCR]', r);

      document.getElementById('scanner-analisi').classList.add('hidden');
      document.getElementById('scanner-result').classList.remove('hidden');

      if (r.aic) {
        document.getElementById('ter-aic').value = r.aic;
        document.getElementById('scanner-result-text').textContent = `✅ AIC: ${r.aic}`;
        await lookupAIC();
      } else {
        document.getElementById('scanner-result-text').textContent =
          `⚠️ Non trovato — inserisci manualmente${r.testo ? '\nLetto: ' + r.testo.substring(0,60) : ''}`;
      }
    } catch(e) {
      document.getElementById('scanner-analisi').classList.add('hidden');
      document.getElementById('scanner-result').classList.remove('hidden');
      document.getElementById('scanner-result-text').textContent = '⚠️ Errore — inserisci AIC manualmente';
    }
  }

  // Fallback: carica foto da file
  async function elaboraFoto(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    fermaCamera();
    document.getElementById('scanner-video-area').style.display = 'none';
    document.getElementById('scanner-analisi').classList.remove('hidden');
    document.getElementById('scanner-result').classList.add('hidden');
    try {
      const formData = new FormData();
      formData.append('foto', file);
      const resp = await fetch('/api/farmaci/ocr-foto', { method: 'POST', body: formData });
      const r = await resp.json();
      document.getElementById('scanner-analisi').classList.add('hidden');
      document.getElementById('scanner-result').classList.remove('hidden');
      if (r.aic) {
        document.getElementById('ter-aic').value = r.aic;
        document.getElementById('scanner-result-text').textContent = `✅ AIC: ${r.aic}`;
        await lookupAIC();
      } else {
        document.getElementById('scanner-result-text').textContent = '⚠️ Non trovato — inserisci AIC manualmente';
      }
    } catch(e) {
      document.getElementById('scanner-analisi').classList.add('hidden');
      document.getElementById('scanner-result').classList.remove('hidden');
      document.getElementById('scanner-result-text').textContent = '⚠️ Errore — inserisci AIC manualmente';
    }
  }

  function avviaOCR() { scattaFoto(); }
  function fermaOCR() { fermaCamera(); }

  // ── Init ───────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    caricaOggi();
    document.querySelectorAll('.modal-overlay').forEach(ov => {
      ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
    });
  });
</script>
